<!doctype html>
<html lang="es">
  <body style="margin:0;background:#f6f7f4;font-family:Arial,Helvetica,sans-serif;color:#1f2933;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f7f4;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border:1px solid #e3e8df;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 12px;text-align:center;">
                <img src="{{ .SiteURL }}/brand/nido-logo.png" width="56" height="56" alt="NIDO" style="display:inline-block;border:0;border-radius:12px;">
                <h1 style="margin:16px 0 0;font-size:24px;line-height:1.2;color:#174c3a;">Confirma que eres tu</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:10px 28px 4px;">
                <p style="margin:0 0 14px;font-size:16px;line-height:1.6;">Usa este codigo temporal para confirmar una accion sensible en NIDO.</p>
                <p style="margin:0;font-size:32px;letter-spacing:6px;line-height:1.4;text-align:center;color:#174c3a;font-weight:700;">{{ .Token }}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px;background:#f0f5f1;border-top:1px solid #e3e8df;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#5f6b63;">Si no solicitaste esta verificacion, ignora este correo y revisa la seguridad de tu cuenta.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
